<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Choose The Right Path</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: black;
    }

    .bg {
      width: 100%;
      height: 100%;
      background-position: center;
      background-repeat: no-repeat;
      background-size: cover;
    }

    @media (min-width: 768px) {
      .bg {
        background-image: url('desktop_v2.png');
      }
    }

    @media (max-width: 767px) {
      .bg {
        background-image: url('mobile.png');
      }
    }
  </style>
</head>
<body>
  <div class="bg"></div>
</body>
</html>
